<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escolar Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">PORTAL<span>.</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="#inicio">Início</a></li>
                <li><a href="#atividades">Atividades</a></li>
                <li><a href="#avaliacoes">Avaliações</a></li>
                <li><a href="#horarios">Horários</a></li>
                <li><a href="#avisos">Avisos</a></li>
                <li><button id="btn-config" class="btn-perfil">⚙️ Perfil</button></li>
            </ul>
        </nav>
    </header>

    <div id="modal-config" class="modal">
        <div class="modal-content">
            <h3>Configurações de Usuário</h3>
            
            <label>Seu Nome:</label>
            <input type="text" id="username" placeholder="Como quer ser chamado?">

            <label>Modo do Tema:</label>
            <select id="theme-mode">
                <option value="auto">Automático (Pela Hora)</option>
                <option value="light">☀️ Sempre Claro</option>
                <option value="dark">🌙 Sempre Escuro</option>
            </select>

            <label>Cor de Destaque:</label>
            <select id="theme-color">
                <option value="#38bdf8">Azul Celestial</option>
                <option value="#22c55e">Verde Esmeralda</option>
                <option value="#eab308">Amarelo Ouro</option>
                <option value="#ef4444">Vermelho Rubi</option>
                <option value="#a855f7">Roxo Místico</option>
                <option value="#f472b6">Rosa Pink</option>
                <option value="#fb923c">Laranja Vibrante</option>
                <option value="#14b8a6">Ciano Marinho</option>
            </select>
            
            <label>Efeito de Clima:</label>
            <select id="clima-teste">
                <option value="auto">Clima Normal</option>
                <option value="chuva">Simular Tempestade 🌧️</option>
            </select>
